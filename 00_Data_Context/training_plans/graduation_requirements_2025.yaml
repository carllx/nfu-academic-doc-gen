version: "2025"
schema_type: "detailed"   # detailed = 有观测点细分 (points)；coarse = 仅大类

requirements:
  1:
    name: 品德素养
    points:
      1.1: 社会主义核心价值观践行
      1.2: 职业修养与责任感
      1.3: 人格与体魄
  2:
    name: 专业知识
    points:
      2.1: 基础知识掌握
      2.2: 跨学科知识整合
      2.3: 全流程创作能力
  3:
    name: 创造性思维
    points:
      3.1: 人文与艺术素养构建
      3.2: 独立创意思考与原创设计
      3.3: 批判性思维与设计优化
  4:
    name: 实际应用能力
    points:
      4.1: 专业技术实现能力
      4.2: 专业技能纵深
      4.3: 问题诊断与解决能力
  5:
    name: 信息能力
    points:
      5.1: 信息应用
      5.2: 信息收集与筛选
      5.3: 现代工具应用
  6:
    name: 沟通表达
    points:
      6.1: 沟通与表达技巧
      6.2: 沟通策略和适应性
  7:
    name: 团队合作能力
    points:
      7.1: 团队协作能力
      7.2: 抗压与领导力
      7.3: 执行能力
  8:
    name: 行业洞察力
    points:
      8.1: 文化交流互鉴
      8.2: 前沿技术跟踪
      8.3: 适配性判断
  9:
    name: 学习与发展能力
    points:
      9.1: 终身学习意识
      9.2: 自我管理能力
      9.3: 自主学习方式
