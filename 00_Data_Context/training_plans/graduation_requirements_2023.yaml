# 毕业要求结构化数据 — 2023 版
# ═══════════════════════════════════════════════════════════════
# SSOT: 本文件为 2023 版人培毕业要求的可机读权威来源
# 来源: 南方人培_源文件/23 级-设计学院-本科(含有专升本).pdf 第153-173页
# 消费者: scripts/audit_course_data.py (人培交叉校验)
# 创建: 2026-05-14
#
# ⚠️ 重要说明：2023 版人培没有独立的"毕业要求"体系，也没有
#   课程支撑矩阵。仅有"培养规格"下的知识/能力二维要求。
#   因此本文件标记为 schema_type: "none"，审计脚本将跳过
#   毕业要求交叉校验。
# ═══════════════════════════════════════════════════════════════

version: "2023"
schema_type: "none"   # none = 该版本人培无毕业要求体系，无法进行交叉校验

# 2023版仅有"培养规格"，记录于此供人工参考
training_specs:
  knowledge:
    - 具有较为扎实的人文社会科学基本理论知识
    - 掌握科学的学习方法和基本的科学研究方法
    - 具有独立获取知识和信息、提出问题、分析问题、解决问题的能力
  ability:
    - 具有科学的世界观和良好的道德行为规范
    - 具有基本的社会适应及交往能力
    - 具有必要的文化基础知识应用能力及专业知识能力
    - 具有熟练的专业辅助设计软件的操作能力
    - 熟练掌握专业设计的操作流程
    - 具有不同设计形式规划及一定的管理能力
    - 具有对画面、空间、镜头语言、设备工艺等的综合运用能力
