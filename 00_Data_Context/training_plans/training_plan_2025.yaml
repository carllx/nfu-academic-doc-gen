version: "2025"
major: 数字媒体艺术
major_english: Digital Media Art
major_code: "130508"
degree: 艺术学学士
duration: 4

# ─── 培养目标 ───────────────────────────────────────────────
training_objectives:
  1: 人文素养与职业道德
  2: 跨领域协作与沟通
  3: 专业知识与技能应用
  4: 独立思考和解决问题
  5: 持续发展与提升

# ─── 毕业要求 → 外部化 SSOT ──────────────────────────────────
# 详细观测点定义见 graduation_requirements.yaml
# 此处仅记录 9 大要求名称索引
graduation_requirements_ref: graduation_requirements.yaml

# ─── 学分结构 ──────────────────────────────────────────────
credit_structure:
  total: 150
  public_required: 47      # 公共必修 (英语12+体育4+思政18+通识11+劳动2)
  public_elective: 6       # 公共选修 (校级公选课/学术报告)
  major_foundation: 19     # 专业基础课
  major_core: 18           # 专业核心课
  major_direction: 18      # 专业方向课
  major_practice: 3        # 专业实习
  major_career: 2          # 就业指导
  major_thesis: 4          # 毕业论文/设计
  major_elective: 33       # 专业选修课

# ─── 课程支撑矩阵 ──────────────────────────────────────────
