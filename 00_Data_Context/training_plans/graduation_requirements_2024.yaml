version: "2024"
schema_type: "coarse"   # coarse = 仅大类，无观测点细分；detailed = 有观测点

requirements:
  1:
    name: 道德修养
    desc: 践行社会主义核心价值观，遵纪守法，具有良好的思想道德素质
  2:
    name: 职业认同
    desc: 认同艺术设计工作者的职业意义，具有人文和科学精神
  3:
    name: 专业知识与理论基础
    desc: 系统掌握数字媒体艺术的基础理论和专业知识，能综合应用所学知识解决问题
  4:
    name: 基本技能
    desc: 熟练掌握数字媒体制作的相关技术和工具（视频编辑、三维建模、交互设计等）
  5:
    name: 综合应用能力
    desc: 具备项目实践经验，能独立完成项目的策划、设计、制作和推广
  6:
    name: 创新设计能力
    desc: 具备创意思考和原创性设计能力，具有批判性思维，能进行持续改进
  7:
    name: 沟通表达
    desc: 良好的口头和书面表达能力，能在多学科及文化背景下进行有效沟通
  8:
    name: 团队合作能力
    desc: 具备团队精神和责任意识，能实现有效的团队交流与合作
  9:
    name: 终身学习与发展能力
    desc: 培养终身学习的意识和能力，持续更新知识结构和技能集
