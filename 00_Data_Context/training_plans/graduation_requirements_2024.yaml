# 毕业要求结构化数据 — 2024 版
# ═══════════════════════════════════════════════════════════════
# SSOT: 本文件为 2024 版人培毕业要求的可机读权威来源
# 来源: 南方人培_源文件/24级-设计学院-本科(含有专升本).pdf 第66-71页
